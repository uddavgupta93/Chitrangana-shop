<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chitrangana | Premium Handcrafted Hub</title>
    <style>
        :root {
            --dark: #0f0f0f;
            --gray: #666666;
            --bg: #ffffff;
            --gold: #c5a880;
            --wa-green: #25D366;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { background-color: var(--bg); color: var(--dark); font-family: 'Playfair Display', serif; overflow-x: hidden; }

        /* গ্রিড এবং রেসপন্সিভনেস ফিক্স */
        .editorial-grid, .shorts-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
        }
        @media (min-width: 768px) { 
            .editorial-grid, .shorts-grid { 
                grid-template-columns: repeat(4, 1fr); 
                gap: 25px; 
            } 
        }

        .luxury-card, .short-card { 
            background: white; 
            cursor: pointer; 
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            transition: var(--transition);
        }
        .luxury-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .card-img-holder { position: relative; width: 100%; padding-top: 100%; background-color: #f9f9f9; }
        .card-img-holder img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .card-details { padding: 15px; text-align: center; }
        .card-title { font-size: 0.9rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-price { font-size: 0.8rem; color: var(--gray); }

        /* পপআপ ইমেজ গ্যালারি ফিক্স */
        .detail-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 3000; display: none; overflow-y: auto; padding: 40px 20px; }
        .detail-content { max-width: 800px; margin: 0 auto; }
        .popup-img-container img { width: 100%; height: auto; border-radius: 4px; }
        .popup-dots { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .thumb-img { width: 60px; height: 60px; object-fit: cover; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; }
        
        .popup-close { font-size: 2rem; cursor: pointer; text-align: right; margin-bottom: 20px; }
        
        /* আপনার আগের বাকি ডিজাইন এখানে বজায় আছে */
        .main-header { position: sticky; top:0; background: rgba(255,255,255,0.95); padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .section-wrapper { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .section-header { text-align: center; margin-bottom: 30px; font-size: 1.5rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="main-header">
        <button onclick="toggleNav()">☰</button>
        <h1>Chitrangana</h1>
        <span onclick="toggleSearch(true)">🔍</span>
    </div>

    <div class="main-homepage-dashboard" id="mainHomepageDashboard">
        <div class="section-wrapper" id="topSellingSection"><div class="section-header">Top Selling</div><div class="editorial-grid" id="topSellingGrid"></div></div>
        <div class="section-wrapper" id="viralSection"><div class="section-header">Viral Collections</div><div class="editorial-grid" id="viralGrid"></div></div>
    </div>

    <div class="detail-popup" id="productDetailPopup">
        <div class="detail-content">
            <div class="popup-close" onclick="closePopup()">×</div>
            <div class="popup-img-container" id="popupImgContainer"></div>
            <div class="popup-dots" id="popupDotsContainer"></div>
            <h2 id="popupTitle"></h2>
            <p id="popupPrice"></p>
            <p id="popupDesc"></p>
            <button onclick="showOrderForm()">Place Order via WhatsApp</button>
        </div>
    </div>

    <script>
        // পপআপ ফাংশন আপডেট করা হয়েছে
        function openPopup(title, price, desc, encodedImages) {
            document.getElementById('popupTitle').innerText = title;
            document.getElementById('popupPrice').innerText = price;
            document.getElementById('popupDesc').innerText = desc;
            document.getElementById('custProduct').value = title;
            
            let images = JSON.parse(decodeURIComponent(encodedImages));
            const imgContainer = document.getElementById('popupImgContainer');
            const dotsContainer = document.getElementById('popupDotsContainer');
            
            imgContainer.innerHTML = `<img src="${images[0]}" id="mainPopupImg">`;
            dotsContainer.innerHTML = "";
            
            images.forEach((imgUrl) => {
                dotsContainer.innerHTML += `<img src="${imgUrl}" class="thumb-img" onclick="document.getElementById('mainPopupImg').src='${imgUrl}'">`;
            });

            document.getElementById('productDetailPopup').style.display = "block";
        }

        function closePopup() { document.getElementById('productDetailPopup').style.display = "none"; }
        
        // বাকি ফাংশনগুলো আপনার আগের কোডের মতোই থাকবে...
        // এখানে শুধু আপনার আগের loadDataFromSheet(), dispatchAllGrids() ইত্যাদি ফাংশনগুলো যোগ করে দেবেন।
    </script>
</body>
</html>
