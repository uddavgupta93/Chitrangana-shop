<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chitrangana | Premium Jewellery & Artisanal Accessories</title>
    <style>
        /* AMAMA BRAND GUIDELINES */
        :root {
            --primary-black: #1A1A1A;
            --text-muted: #666666;
            --border-light: #EBEBEB;
            --site-bg: #FFFFFF;
            --gold-accent: #BFA37A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--site-bg);
            color: var(--primary-black);
            font-family: 'Playfair Display', 'Georgia', serif;
            -webkit-font-smoothing: antialiased;
        }

        /* TOP PROMOTIONAL LINE */
        .top-banner {
            background-color: var(--primary-black);
            color: #FFFFFF;
            text-align: center;
            padding: 10px;
            font-size: 0.7rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
        }

        /* LUXURY BRAND LOGO AREA */
        header {
            padding: 35px 20px;
            text-align: center;
            background: var(--site-bg);
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: 10px;
            color: var(--primary-black);
            text-transform: uppercase;
            display: inline-block;
        }

        header p {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* AMAMA MINIMAL NAV BAR */
        .category-nav {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            background-color: var(--site-bg);
            padding: 15px 10px;
            position: sticky;
            top: 0;
            z-index: 999;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
            justify-content: flex-start;
        }

        @media (min-width: 768px) {
            .category-nav { justify-content: center; }
        }

        .category-nav::-webkit-scrollbar { display: none; }

        .category-btn {
            background: none;
            color: var(--text-muted);
            border: none;
            padding: 5px 22px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.3s ease;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
        }

        .category-btn.active, .category-btn:hover {
            color: var(--primary-black);
            font-weight: 500;
        }

        /* HERO EDITORIAL STATEMENT BANNER */
        .hero-section {
            max-width: 1200px;
            margin: 20px auto 0 auto;
            padding: 0 20px;
            text-align: center;
        }

        .hero-banner {
            width: 100%;
            height: 280px;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1573408301185-9146fe634ad0?w=1200') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #FFFFFF;
        }

        @media (max-width: 768px) {
            .hero-banner { height: 180px; }
        }

        .hero-banner h2 {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* LUXURY EDITORIAL GRID */
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Mobile: 2 items side by side */
            gap: 25px;
        }

        @media (min-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr); /* Desktop: Clean 3rd column view */
                gap: 40px;
            }
        }

        /* AMAMA UN-BORDERED CARD LUXURY LOOK */
        .product-card {
            background: var(--site-bg);
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .image-container {
            position: relative;
            width: 100%;
            padding-top: 130%; /* Standard Premium Jewelry aspect ratio */
            background-color: #F9F9F9;
            overflow: hidden;
        }

        .main-product-img, .hover-product-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease-in-out, transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .hover-product-img {
            opacity: 0;
        }

        /* Hover image transition effect like amama.in */
        .product-card:hover .hover-product-img {
            opacity: 1;
        }
        
        .product-card:hover .main-product-img {
            transform: scale(1.03);
        }

        /* CLEAN MINIMAL LABEL */
        .product-info {
            padding-top: 15px;
            text-align: center;
        }

        .product-title {
            font-size: 1rem;
            color: var(--primary-black);
            margin-bottom: 6px;
            font-weight: 400;
            letter-spacing: 0.8px;
            line-height: 1.4;
            text-transform: capitalize;
        }

        .product-meta {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .price-container {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--primary-black);
            margin-top: 5px;
        }

        /* DISCRETE RESTRAINT BUTTON */
        .order-btn {
            margin-top: 12px;
            background: none;
            border: 1px solid var(--primary-black);
            color: var(--primary-black);
            padding: 10px 0;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .order-btn:hover {
            background-color: var(--primary-black);
            color: #FFFFFF;
        }

        /* MODAL STYLING */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(3px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
        }

        .modal-content {
            background: #FFFFFF;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            position: relative;
            border: 1px solid var(--border-light);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary-black);
        }

        .modal-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary-black);
            margin-bottom: 25px;
            text-align: center;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
            font-family: 'Montserrat', sans-serif;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #E5E5E5;
            background: #FFFFFF;
            font-size: 0.85rem;
            outline: none;
            color: var(--primary-black);
            font-family: 'Montserrat', sans-serif;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--primary-black);
        }

        .submit-whatsapp {
            background-color: var(--primary-black);
            color: #FFFFFF;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
        }

        /* MINIMAL FOOTER */
        footer {
            background: #FAFAFA;
            text-align: center;
            padding: 50px 20px;
            margin-top: 100px;
            border-top: 1px solid var(--border-light);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
            font-family: 'Montserrat', sans-serif;
        }

        .social-btn {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--primary-black);
            transition: color 0.3s;
        }

        .social-btn:hover {
            color: var(--gold-accent);
        }

        footer p {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:wght@400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="top-banner">The Curated Statement Collection • Crafted With Precision</div>

    <header>
        <h1>CHITRANGANA</h1>
        <p>Fine Handcrafted Artistry & Accents</p>
    </header>

    <div class="category-nav">
        <button class="category-btn active" onclick="filterCategory('All')">Shop All</button>
        <button class="category-btn" onclick="filterCategory('Handmade Products')">Handmade Products</button>
        <button class="category-btn" onclick="filterCategory('Jewellery')">Jewellery</button>
        <button class="category-btn" onclick="filterCategory('Ornaments')">Ornaments</button>
        <button class="category-btn" onclick="filterCategory('Cosmetics')">Cosmetics</button>
        <button class="category-btn" onclick="filterCategory('Skincare')">Skincare</button>
        <button class="category-btn" onclick="filterCategory('Bags and shoes')">Bags & Shoes</button>
    </div>

    <div class="hero-section">
        <div class="hero-banner">
            <h2>The Artisanal Edit</h2>
        </div>
    </div>

    <div class="container">
        <div class="product-grid" id="productGrid"></div>
    </div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeOrderForm()">&times;</span>
            <div class="modal-title" id="modalProductTitle">REQUEST INQUIRY</div>
            
            <form id="whatsappForm" onsubmit="sendToWhatsApp(event)">
                <input type="hidden" id="formProductName">
                <input type="hidden" id="formProductPrice">
                
                <div class="form-group">
                    <label>NAME *</label>
                    <input type="text" id="custName" required>
                </div>
                <div class="form-group">
                    <label>SHIPPING ADDRESS *</label>
                    <textarea id="custLocation" rows="2" required></textarea>
                </div>
                <div class="form-group">
                    <label>PAYMENT PREFERENCE *</label>
                    <select id="custPayment" required>
                        <option value="bKash">bKash (বিকাশ)</option>
                        <option value="Nagad">Nagad (নগদ)</option>
                        <option value="Cash on Delivery">Cash on Delivery</option>
                    </select>
                </div>
                <button type="submit" class="submit-whatsapp">SEND SELECTION</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="https://www.facebook.com/share/1CBVy5vRrD/" target="_blank" class="social-btn">Facebook</a>
            <a href="https://wa.me/8801850341190" target="_blank" class="social-btn">WhatsApp</a>
        </div>
        <p>© 2026 CHITRANGANA ARCHIVE. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        /* CHITRANGANA REAL EXCLUSIVE ARCHIVE USING HIGH QUALITY LINKS */
        const products = [
            {
                id: 1,
                title: "Classic Floral Choker In Crimson",
                category: "Handmade Products",
                type: "Handmade Art",
                price: "450 BDT",
                images: [
                    "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=600",
                    "https://images.unsplash.com/photo-1602751584552-8ba73aad10e1?w=600" /* ২য় ডিফরেন্ট ছবি হোভারের জন্য */
                ]
            },
            {
                id: 2,
                title: "Artisanal Statement Golden Jhumka",
                category: "Jewellery",
                type: "Traditional Edit",
                price: "380 BDT",
                images: [
                    "https://images.unsplash.com/photo-1630019852942-f89202989a59?w=600",
                    "https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?w=600"
                ]
            },
            {
                id: 3,
                title: "Bespoke Pastel Pearl Wrist Wear",
                category: "Ornaments",
                type: "Minimalist Beadwork",
                price: "290 BDT",
                images: [
                    "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=600",
                    "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=600"
                ]
            }
        ];

        function displayProducts(filteredData) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            
            if(filteredData.length === 0) {
                grid.innerHTML = "<p style='text-align:center; grid-column: span 2; color:#999; padding:60px; font-family:sans-serif; font-size:0.75rem; letter-spacing:1.5px;'>COLLECTION EMPTY AT PRESENT.</p>";
                return;
            }

            filteredData.forEach(product => {
                const hoverImg = product.images[1] ? product.images[1] : product.images[0];
                
                const cardHTML = `
                    <div class="product-card">
                        <div class="image-container">
                            <img src="${product.images[0]}" class="main-product-img" alt="${product.title}">
                            <img src="${hoverImg}" class="hover-product-img" alt="${product.title}">
                        </div>
                        <div class="product-info">
                            <div class="product-meta">${product.category} • ${product.type}</div>
                            <h3 class="product-title">${product.title}</h3>
                            <div class="price-container">
                                <span class="new-price">${product.price}</span>
                            </div>
                            <button class="order-btn" onclick="openOrderForm('${product.title}', '${product.price}')">Select Item</button>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function filterCategory(categoryName) {
            const buttons = document.getElementsByClassName('category-btn');
            for(let btn of buttons) {
                if(btn.innerText.toUpperCase().includes(categoryName.toUpperCase()) || (categoryName==='All' && btn.innerText.includes('All'))) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            }

            if(categoryName === 'All') {
                displayProducts(products);
            } else {
                const filtered = products.filter(p => p.category === categoryName);
                displayProducts(filtered);
            }
        }

        function openOrderForm(title, price) {
            document.getElementById('orderModal').style.display = 'flex';
            document.getElementById('modalProductTitle').innerText = "INQUIRE: " + title;
            document.getElementById('formProductName').value = title;
            document.getElementById('formProductPrice').value = price;
        }

        function closeOrderForm() {
            document.getElementById('orderModal').style.display = 'none';
        }

        function sendToWhatsApp(event) {
            event.preventDefault();
            const pName = document.getElementById('formProductName').value;
            const pPrice = document.getElementById('formProductPrice').value;
            const cName = document.getElementById('custName').value;
            const cLocation = document.getElementById('custLocation').value;
            const cPayment = document.getElementById('custPayment').value;
            
            const message = `*CHITRANGANA - SELECTION*\n\n` +
                            `✨ *Product:* ${pName}\n` +
                            `💰 *Price:* ${pPrice}\n\n` +
                            `👤 *Name:* ${cName}\n` +
                            `📍 *Address:* ${cLocation}\n` +
                            `💳 *Payment Type:* ${cPayment}\n\n` +
                            `_Please process this web inquiry._`;
            
            const whatsappURL = `https://api.whatsapp.com/send?phone=8801850341190&text=${encodeURIComponent(message)}`;
            window.open(whatsappURL, '_blank');
            closeOrderForm();
        }

        window.onload = function() {
            displayProducts(products);
        };
    </script>
</body>
</html>
