<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chitrangana | Premium Jewellery & Handcrafted Accessories</title>
    <style>
        /* AMAMA.IN LUXURY MINIMALIST THEME */
        :root {
            --amama-dark: #121212;      /* প্রফেশনাল লাক্সারি ব্ল্যাক */
            --amama-gray: #707070;      /* ক্লাসিক টেক্সট গ্রে */
            --amama-bg: #FFFFFF;        /* ক্লিন হোয়াইট ব্যাকগ্রাউন্ড */
            --amama-light-gray: #F7F7F7;/* সফট ইমেজ ব্যাকড্রপ */
            --gold-accent: #C5A059;     /* প্রিমিয়াম মেটালিক গোল্ড */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--amama-bg);
            color: var(--amama-dark);
            font-family: 'Playfair Display', 'Georgia', serif;
            -webkit-font-smoothing: antialiased;
        }

        /* AMAMA INSPIRED TOP UTILITY ANNOUNCEMENT BAR */
        .announcement-bar {
            background-color: var(--amama-dark);
            color: #FFFFFF;
            text-align: center;
            padding: 8px 10px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
        }

        /* CLEAN MINIMALIST HEADER */
        header {
            background-color: var(--amama-bg);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #EEEEEE;
        }

        header h1 {
            font-size: 2.6rem;
            font-weight: 400;
            letter-spacing: 8px;
            color: var(--amama-dark);
            text-transform: uppercase;
        }

        header p {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--amama-gray);
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* STICKY LUXURY CATEGORY NAV */
        .category-nav {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            background-color: var(--amama-bg);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 999;
            border-bottom: 1px solid #F0F0F0;
            justify-content: flex-start;
        }

        @media (min-width: 768px) {
            .category-nav { justify-content: center; }
        }

        .category-nav::-webkit-scrollbar { display: none; }

        .category-btn {
            background: none;
            color: var(--amama-gray);
            border: none;
            padding: 8px 20px;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
        }

        .category-btn.active, .category-btn:hover {
            color: var(--amama-dark);
            font-weight: 600;
        }

        /* PRODUCT GALLERY CONTAINER */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 35px;
        }

        /* AMAMA MINIMAL CARD DESIGN (NO BORDERS, NO SHADOWS) */
        .product-card {
            background: var(--amama-bg);
            overflow: hidden;
            transition: opacity 0.3s ease;
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 380px;
            background-color: var(--amama-light-gray);
        }

        .main-product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .product-card:hover .main-product-img {
            transform: scale(1.03);
        }

        /* DOT GALAXY INTERACTIVE BULLETS (INSTEAD OF CHUNKY IMAGES) */
        .thumb-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.05));
        }

        .thumb-dot {
            width: 8px;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .thumb-dot.active {
            background-color: var(--amama-dark);
            transform: scale(1.2);
        }

        /* MINIMAL INFO */
        .product-info {
            padding: 18px 5px 10px 5px;
            text-align: left; /* Amama uses editorial left alignment */
        }

        .product-tag {
            font-family: 'Montserrat', sans-serif;
            color: var(--gold-accent);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 6px;
        }

        .product-title {
            font-size: 1.15rem;
            color: var(--amama-dark);
            margin-bottom: 6px;
            font-weight: 400;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        .product-desc {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            color: var(--amama-gray);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .price-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .new-price {
            color: var(--amama-dark);
            font-weight: 500;
        }

        /* LUXURY EDITORIAL BUTTON */
        .order-btn {
            display: block;
            width: 100%;
            background-color: var(--amama-dark);
            color: #FFFFFF;
            text-align: center;
            padding: 14px;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-family: 'Montserrat', sans-serif;
            border: 1px solid var(--amama-dark);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .order-btn:hover {
            background-color: transparent;
            color: var(--amama-dark);
        }

        /* CLEAN OVERLAY MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(3px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
        }

        .modal-content {
            background: #FFFFFF;
            padding: 35px 25px;
            width: 100%;
            max-width: 420px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--amama-dark);
        }

        .modal-title {
            font-size: 1.15rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--amama-dark);
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 1px solid #F0F0F0;
            padding-bottom: 12px;
        }

        .form-group {
            margin-bottom: 20px;
            font-family: 'Montserrat', sans-serif;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--amama-gray);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #E0E0E0;
            background: #FFFFFF;
            font-size: 0.9rem;
            outline: none;
            color: var(--amama-dark);
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--amama-dark);
        }

        .submit-whatsapp {
            background-color: var(--amama-dark);
            color: #FFFFFF;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        /* MINIMAL FOOTER */
        footer {
            background: var(--amama-light-gray);
            text-align: center;
            padding: 60px 20px;
            margin-top: 80px;
            border-top: 1px solid #EEEEEE;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            font-family: 'Montserrat', sans-serif;
        }

        .social-btn {
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--amama-dark);
            border-bottom: 1px solid var(--amama-dark);
            padding-bottom: 2px;
            transition: color 0.3s;
        }

        .social-btn:hover {
            color: var(--gold-accent);
            border-color: var(--gold-accent);
        }

        footer p {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            color: var(--amama-gray);
            letter-spacing: 1px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="announcement-bar">Handmade with Love • Free Shipping Within Bangladesh</div>

    <header>
        <h1>CHITRANGANA</h1>
        <p>Premium Crafted Jewellery & Fine Collection</p>
    </header>

    <div class="category-nav">
        <button class="category-btn active" onclick="filterCategory('All')">All Collection</button>
        <button class="category-btn" onclick="filterCategory('Handmade Products')">Handmade Products</button>
        <button class="category-btn" onclick="filterCategory('Jewellery')">Jewellery</button>
        <button class="category-btn" onclick="filterCategory('Ornaments')">Ornaments</button>
        <button class="category-btn" onclick="filterCategory('Cosmetics')">Cosmetics</button>
        <button class="category-btn" onclick="filterCategory('Skincare')">Skincare</button>
        <button class="category-btn" onclick="filterCategory('Bags and shoes')">Bags & Shoes</button>
    </div>

    <div class="container">
        <div class="product-grid" id="productGrid"></div>
    </div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeOrderForm()">&times;</span>
            <div class="modal-title" id="modalProductTitle">REQUEST SELECTION</div>
            
            <form id="whatsappForm" onsubmit="sendToWhatsApp(event)">
                <input type="hidden" id="formProductName">
                <input type="hidden" id="formProductPrice">
                
                <div class="form-group">
                    <label>NAME *</label>
                    <input type="text" id="custName" required placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label>SHIPPING ADDRESS *</label>
                    <textarea id="custLocation" rows="2" required placeholder="Apartment, street, city"></textarea>
                </div>
                <div class="form-group">
                    <label>PAYMENT METHOD *</label>
                    <select id="custPayment" required>
                        <option value="bKash">bKash (বিকাশ)</option>
                        <option value="Nagad">Nagad (নগদ)</option>
                        <option value="Cash on Delivery">Cash on Delivery</option>
                    </select>
                </div>
                <button type="submit" class="submit-whatsapp">PROCEED TO WHATSAPP</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="https://www.facebook.com/share/1CBVy5vRrD/" target="_blank" class="social-btn">Facebook</a>
            <a href="https://wa.me/8801850341190" target="_blank" class="social-btn">WhatsApp</a>
        </div>
        <p>© 2026 CHITRANGANA SHOP. CURATED INDEPENDENTLY.</p>
    </footer>

    <script>
        /* CHITRANGANA ACTIVE PRODUCT DATABASE WITH REAL PRESERVED IMAGES */
        const products = [
            {
                id: 1,
                title: "Premium Handmade Royal Floral Choker",
                category: "Handmade Products",
                type: "Signature Design",
                price: "450 BDT",
                desc: "শতভাগ নিখুঁত সুতা ও প্রিমিয়াম অ্যান্টিক পুঁতি দিয়ে তৈরি লিমিটেড এডিশন গলার চোকার সেট।",
                images: [
                    "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=600",
                    "https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?w=600"
                ]
            },
            {
                id: 2,
                title: "Exquisite Handcrafted Statement Jhumka",
                category: "Jewellery",
                type: "Artisanal",
                price: "380 BDT",
                desc: "ঐতিহ্যবাহী বুনন শৈলীতে কাস্টম সুতা ও পার্ল বিডসের কম্বিনেশনে তৈরি জমকালো কানের দুল।",
                images: [
                    "https://images.unsplash.com/photo-1630019852942-f89202989a59?w=600",
                    "https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?w=600"
                ]
            },
            {
                id: 3,
                title: "Bespoke Pastel Pearl Wrist Wear",
                category: "Ornaments",
                type: "Premium Glass Beads",
                price: "290 BDT",
                desc: "প্রতিদিনের আউটফিটের সাথে মানানসই এলিগ্যান্ট এবং মিনিমালিস্ট ডিজাইনের পার্ল রি wristলেট।",
                images: [
                    "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=600"
                ]
            }
        ];

        function displayProducts(filteredData) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            
            if(filteredData.length === 0) {
                grid.innerHTML = "<p style='text-align:center; width:100%; color:#999; padding:60px; font-family:sans-serif; font-size:0.85rem; letter-spacing:1px;'>NO ITEMS FOUND IN THIS CATEGORY.</p>";
                return;
            }

            filteredData.forEach(product => {
                let thumbHTML = '';
                if(product.images.length > 1) {
                    product.images.forEach((img, index) => {
                        thumbHTML += `<span class="thumb-dot ${index===0?'active':''}" onclick="changeMainImage(this, 'prod-img-${product.id}', '${img}')"></span>`;
                    });
                }

                const cardHTML = `
                    <div class="product-card">
                        <div class="image-container">
                            <img src="${product.images[0]}" class="main-product-img" id="prod-img-${product.id}" alt="${product.title}">
                            <div class="thumb-bar">${thumbHTML}</div>
                        </div>
                        <div class="product-info">
                            <span class="product-tag">${product.category} • ${product.type}</span>
                            <h3 class="product-title">${product.title}</h3>
                            <p class="product-desc">${product.desc}</p>
                            <div class="price-container">
                                <span class="new-price">${product.price}</span>
                            </div>
                            <button class="order-btn" onclick="openOrderForm('${product.title}', '${product.price}')">Inquire Selection</button>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function changeMainImage(dot, mainImgId, imgSrc) {
            const mainImg = document.getElementById(mainImgId);
            mainImg.src = imgSrc;
            const dots = dot.parentElement.getElementsByClassName('thumb-dot');
            for(let d of dots) { d.classList.remove('active'); }
            dot.classList.add('active');
        }

        function filterCategory(categoryName) {
            const buttons = document.getElementsByClassName('category-btn');
            for(let btn of buttons) {
                if(btn.innerText.toUpperCase().includes(categoryName.toUpperCase()) || (categoryName==='All' && btn.innerText.includes('All'))) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            }

            if(categoryName === 'All') {
                displayProducts(products);
            } else {
                const filtered = products.filter(p => p.category === categoryName);
                displayProducts(filtered);
            }
        }

        function openOrderForm(title, price) {
            document.getElementById('orderModal').style.display = 'flex';
            document.getElementById('modalProductTitle').innerText = "INQUIRE: " + title;
            document.getElementById('formProductName').value = title;
            document.getElementById('formProductPrice').value = price;
        }

        function closeOrderForm() {
            document.getElementById('orderModal').style.display = 'none';
        }

        function sendToWhatsApp(event) {
            event.preventDefault();
            const pName = document.getElementById('formProductName').value;
            const pPrice = document.getElementById('formProductPrice').value;
            const cName = document.getElementById('custName').value;
            const cLocation = document.getElementById('custLocation').value;
            const cPayment = document.getElementById('custPayment').value;
            
            const message = `*CHITRANGANA - NEW WEB INQUIRY*\n\n` +
                            `✨ *Product:* ${pName}\n` +
                            `💰 *Price:* ${pPrice}\n\n` +
                            `👤 *Client Name:* ${cName}\n` +
                            `📍 *Address:* ${cLocation}\n` +
                            `💳 *Payment:* ${cPayment}\n\n` +
                            `_Please confirm availability._`;
            
            const whatsappURL = `https://api.whatsapp.com/send?phone=8801850341190&text=${encodeURIComponent(message)}`;
            window.open(whatsappURL, '_blank');
            closeOrderForm();
        }

        window.onload = function() {
            displayProducts(products);
        };
    </script>
</body>
</html>
