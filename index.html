<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chitrangana - Premium Collection</title>
    <style>
        :root {
            --primary-pink: #F7E7E4;
            --rose-gold: #B76E79;
            --dark-gold: #915F6D;
            --luxury-black: #2C2C2C;
            --pure-white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #FCF8F7;
            color: var(--luxury-black);
        }

        header {
            background-color: var(--pure-white);
            text-align: center;
            padding: 30px 15px;
            border-bottom: 2px solid var(--primary-pink);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        header h1 {
            color: var(--rose-gold);
            font-size: 2.5rem;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        header p {
            color: var(--dark-gold);
            font-size: 0.95rem;
            font-style: italic;
        }

        .category-nav {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            background-color: var(--primary-pink);
            padding: 12px 10px;
            position: sticky;
            top: 0;
            z-index: 999;
            gap: 10px;
        }

        .category-nav::-webkit-scrollbar {
            display: none;
        }

        .category-btn {
            background: var(--pure-white);
            color: var(--dark-gold);
            border: 1px solid var(--rose-gold);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-btn.active, .category-btn:hover {
            background-color: var(--rose-gold);
            color: var(--pure-white);
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .product-card {
            background: var(--pure-white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--primary-pink);
            transition: transform 0.3s;
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 300px;
            background-color: #f9f9f9;
        }

        .main-product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumb-bar {
            display: flex;
            justify-content: center;
            gap: 5px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.9);
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        .thumb-img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .thumb-img.active {
            border-color: var(--rose-gold);
        }

        .product-info {
            padding: 20px;
        }

        .product-tag {
            background: var(--primary-pink);
            color: var(--dark-gold);
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .product-title {
            font-size: 1.2rem;
            color: var(--luxury-black);
            margin-bottom: 8px;
        }

        .product-desc {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .price-container {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .old-price {
            font-size: 1.1rem;
            color: #999;
            text-decoration: line-through;
        }

        .new-price {
            font-size: 1.4rem;
            color: var(--dark-gold);
            font-weight: bold;
        }

        .offer-badge {
            background: #ff4d4d;
            color: white;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .order-btn {
            display: block;
            width: 100%;
            background-color: var(--rose-gold);
            color: var(--pure-white);
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
        }

        .order-btn:hover {
            background-color: var(--dark-gold);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
        }

        .modal-content {
            background: var(--pure-white);
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        .modal-title {
            color: var(--dark-gold);
            margin-bottom: 15px;
            font-size: 1.4rem;
            border-bottom: 1px solid var(--primary-pink);
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }

        .submit-whatsapp {
            background-color: #25D366;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        footer {
            background: var(--pure-white);
            text-align: center;
            padding: 40px 15px;
            margin-top: 30px;
            border-top: 1px solid var(--primary-pink);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .social-btn {
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .fb-btn { background-color: #1877F2; }
        .wa-btn { background-color: #25D366; }

        footer p {
            font-size: 0.85rem;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>CHITRANGANA</h1>
        <p>Handmade Jewelry, Ornaments & Premium Collection</p>
    </header>

    <div class="category-nav">
        <button class="category-btn active" onclick="filterCategory('All')">All Collection</button>
        <button class="category-btn" onclick="filterCategory('Handmade Products')">Handmade Products</button>
        <button class="category-btn" onclick="filterCategory('Jewellery')">Jewellery</button>
        <button class="category-btn" onclick="filterCategory('Ornaments')">Ornaments</button>
        <button class="category-btn" onclick="filterCategory('Cosmetics')">Cosmetics</button>
        <button class="category-btn" onclick="filterCategory('Skincare')">Skincare</button>
        <button class="category-btn" onclick="filterCategory('Bags and shoes')">Bags & Shoes</button>
    </div>

    <div class="container">
        <div class="product-grid" id="productGrid"></div>
    </div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeOrderForm()">&times;</span>
            <div class="modal-title" id="modalProductTitle">অর্ডার প্লেস করুন</div>
            
            <form id="whatsappForm" onsubmit="sendToWhatsApp(event)">
                <input type="hidden" id="formProductName">
                <input type="hidden" id="formProductPrice">
                
                <div class="form-group">
                    <label>আপনার নাম (Name): *</label>
                    <input type="text" id="custName" required placeholder="আপনার পুরো নাম লিখুন">
                </div>
                <div class="form-group">
                    <label>ডেলিভারি ঠিকানা (Location): *</label>
                    <textarea id="custLocation" rows="2" required placeholder="গ্রাম/রোড, থানা, জেলা লিখুন"></textarea>
                </div>
                <div class="form-group">
                    <label>পেমেন্ট মেথড (Payment Method): *</label>
                    <select id="custPayment" required>
                        <option value="bKash">bKash (বিকাশ)</option>
                        <option value="Nagad">Nagad (নগদ)</option>
                        <option value="Cash on Delivery">Cash on Delivery (ক্যাশ অন ডেলিভারি)</option>
                    </select>
                </div>
                <button type="submit" class="submit-whatsapp">WhatsApp-এ অর্ডার নিশ্চিত করুন</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="https://www.facebook.com/share/1CBVy5vRrD/" target="_blank" class="social-btn fb-btn">Facebook Page</a>
            <a href="https://wa.me/8801850341190" target="_blank" class="social-btn wa-btn">Direct WhatsApp</a>
        </div>
        <p>© 2026 Chitrangana. All Rights Reserved.</p>
    </footer>

    <script>
        const products = [
            {
                id: 1,
                title: "Premium Handmade Floral Choker",
                category: "Handmade Products",
                type: "Premium Jewelry",
                hasDiscount: false,
                price: "450 Taka",
                oldPrice: "",
                discountText: "",
                desc: "শতভাগ খাঁটি সুতা এবং পুঁতি দিয়ে যত্নসহকারে কাস্টমাইজড ডিজাইনে তৈরি করা গলার চোকার।",
                images: [
                    "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=500",
                    "https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?w=500"
                ]
            },
            {
                id: 2,
                title: "Ultra Matte Mini Liquid Lipstick",
                category: "Cosmetics",
                type: "Beauty Glazed",
                hasDiscount: true,
                price: "135 Taka",
                oldPrice: "150 Taka",
                discountText: "10% OFF",
                desc: "দীর্ঘস্থায়ী ম্যাট ফিনিশ এবং অত্যন্ত আকর্ষক শেড। সীমিত স্টকে উপলব্ধ।",
                images: [
                    "https://images.unsplash.com/photo-1586495777744-4413f21062fa?w=500",
                    "https://images.unsplash.com/photo-1625093742435-6fa192b6fb10?w=500"
                ]
            }
        ];

        function displayProducts(filteredData) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            
            if(filteredData.length === 0) {
                grid.innerHTML = "<p style='text-align:center; width:100%; color:#999; padding:40px;'>এই ক্যাটাগরিতে বর্তমানে কোনো প্রোডাক্ট নেই।</p>";
                return;
            }

            filteredData.forEach(product => {
                let thumbHTML = '';
                product.images.forEach((img, index) => {
                    thumbHTML += `<img src="${img}" class="thumb-img ${index===0?'active':''}" onclick="changeMainImage(this, 'prod-img-${product.id}')">`;
                });

                let priceHTML = '';
                if(product.hasDiscount) {
                    priceHTML = `
                        <span class="old-price">${product.oldPrice}</span>
                        <span class="new-price">${product.price}</span>
                        <span class="offer-badge">${product.discountText}</span>
                    `;
                } else {
                    priceHTML = `<span class="new-price">${product.price}</span>`;
                }

                const cardHTML = `
                    <div class="product-card">
                        <div class="image-container">
                            <img src="${product.images[0]}" class="main-product-img" id="prod-img-${product.id}" alt="${product.title}">
                            <div class="thumb-bar">${thumbHTML}</div>
                        </div>
                        <div class="product-info">
                            <span class="product-tag">${product.category} • ${product.type}</span>
                            <h3 class="product-title">${product.title}</h3>
                            <p class="product-desc">${product.desc}</p>
                            <div class="price-container">${priceHTML}</div>
                            <button class="order-btn" onclick="openOrderForm('${product.title}', '${product.price}')">Order Now</button>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function changeMainImage(thumb, mainImgId) {
            const mainImg = document.getElementById(mainImgId);
            mainImg.src = thumb.src;
            const thumbs = thumb.parentElement.getElementsByClassName('thumb-img');
            for(let t of thumbs) { t.classList.remove('active'); }
            thumb.classList.add('active');
        }

        function filterCategory(categoryName) {
            const buttons = document.getElementsByClassName('category-btn');
            for(let btn of buttons) {
                if(btn.innerText.includes(categoryName) || (categoryName==='All' && btn.innerText.includes('All'))) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            }

            if(categoryName === 'All') {
                displayProducts(products);
            } else {
                const filtered = products.filter(p => p.category === categoryName);
                displayProducts(filtered);
            }
        }

        function openOrderForm(title, price) {
            document.getElementById('orderModal').style.display = 'flex';
            document.getElementById('modalProductTitle').innerText = "Order: " + title;
            document.getElementById('formProductName').value = title;
            document.getElementById('formProductPrice').value = price;
        }

        function closeOrderForm() {
            document.getElementById('orderModal').style.display = 'none';
        }

        function sendToWhatsApp(event) {
            event.preventDefault();
            const pName = document.getElementById('formProductName').value;
            const pPrice = document.getElementById('formProductPrice').value;
            const cName = document.getElementById('custName').value;
            const cLocation = document.getElementById('custLocation').value;
            const cPayment = document.getElementById('custPayment').value;
            
            const message = `*নতুন অর্ডার এসেছে (Chitrangana)*\n\n` +
                            `📦 *প্রোডাক্ট:* ${pName}\n` +
                            `💰 *মূল্য:* ${pPrice}\n\n` +
                            `👤 *কাস্টমারের নাম:* ${cName}\n` +
                            `📍 *ঠিকানা:* ${cLocation}\n` +
                            `💳 *পেমেন্ট মেথড:* ${cPayment}\n\n` +
                            `_অনুগ্রহ করে অর্ডারটি কনফার্ম করুন।_`;
            
            const whatsappURL = `https://api.whatsapp.com/send?phone=8801850341190&text=${encodeURIComponent(message)}`;
            window.open(whatsappURL, '_blank');
            closeOrderForm();
        }

        window.onload = function() {
            displayProducts(products);
        };
    </script>
</body>
</html>
